<!DOCTYPE html>
<html lang="zh">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3785488016873433" crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — GEO Audit</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--z950:#09090b;--z900:#121215;--z850:#18181b;--z800:#1c1c1f;--z700:#27272a;--z500:#71717a;--z400:#a1a1aa;--z200:#d4d4d8;--z100:#e4e4e7;--white:#fafafa;--emerald:#10b981;--emerald-bright:#34d399;--emerald-dim:rgba(16,185,129,0.10);--radius:18px;--radius-sm:12px}
body{background:var(--z950);color:var(--z200);font-family:'Geist',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--z900);border:1px solid var(--z800);border-radius:var(--radius);padding:36px;max-width:700px;width:100%}
h1{color:var(--white);font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em}
.sub{color:var(--z500);font-size:13px;margin-bottom:28px}
.radar-wrap{max-width:380px;margin:0 auto 28px}
.score{text-align:center;margin:20px 0}
.score .big{font-size:52px;font-weight:700;color:var(--emerald);line-height:1}
.score .label{font-size:12px;color:var(--z500);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:24px}
.ecard{background:var(--z950);border:1px solid var(--z800);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:12px}
.ecard.met{border-color:rgba(16,185,129,.2)}
.ecard.miss{border-color:rgba(239,68,68,.1)}
.edot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.edot.green{background:var(--emerald);box-shadow:0 0 8px rgba(16,185,129,.4)}
.edot.gray{background:var(--z600)}
.einfo .name{color:var(--z200);font-size:13px;font-weight:500}
.einfo .st{font-size:11px;margin-top:2px}
.einfo .st.found{color:var(--emerald)}
.einfo .st.nf{color:#ef4444}
.cta{text-align:center;margin-top:28px;padding-top:24px;border-top:1px solid var(--z800)}
.cta p{color:var(--z400);font-size:13px;margin-bottom:14px}
.cta a{display:inline-block;background:var(--white);color:var(--z950);padding:12px 28px;border-radius:24px;font-weight:600;font-size:14px;text-decoration:none;transition:.3s}
.cta a:hover{background:var(--emerald);color:#fff}
</style>
</head>
<body>
<div class="card">
  <h1>Nike — Demo Audit</h1>
  <div class="sub">Live example · 5 AI engines · 27 seconds</div>
  <div class="radar-wrap"><canvas id="radar"></canvas></div>
  <div class="score"><div class="big">5/5</div><div class="label">Engine Coverage</div></div>
  <div class="grid" id="grid"></div>
  <div class="cta">
    <p>Run this audit on your brand. Free. 27 seconds.</p>
    <a href="https://5529900303702.gumroad.com/l/free-scan" data-gumroad-overlay="true">Free Scan Your Brand →</a>
  </div>
</div>
<script>
const engines=[
  {name:"DeepSeek",met:true,region:"China"},
  {name:"ChatGPT",met:true,region:"Global"},
  {name:"Perplexity",met:true,region:"Global"},
  {name:"Gemini",met:true,region:"Global"},
  {name:"Claude",met:true,region:"Global"},
];
document.getElementById('grid').innerHTML=engines.map(e=>
  `<div class="ecard ${e.met?'met':'miss'}">
    <div class="edot ${e.met?'green':'gray'}"></div>
    <div class="einfo"><div class="name">${e.name}</div><div class="st ${e.met?'found':'nf'}">${e.met?'✓ Mentioned':'✗ Not found'}</div></div>
  </div>`
).join('');
new Chart(document.getElementById('radar'),{
  type:'radar',
  data:{
    labels:engines.map(e=>e.name),
    datasets:[{
      data:engines.map(e=>e.met?1:0),
      backgroundColor:'rgba(16,185,129,0.12)',
      borderColor:'#10b981',
      borderWidth:2,
      pointBackgroundColor:engines.map(e=>e.met?'#10b981':'#3f3f46'),
      pointBorderColor:engines.map(e=>e.met?'#10b981':'#3f3f46'),
      pointRadius:6,
    }]
  },
  options:{
    responsive:true,
    scales:{r:{beginAtZero:true,max:1,ticks:{display:false},grid:{color:'rgba(255,255,255,0.05)'},angleLines:{color:'rgba(255,255,255,0.05)'},pointLabels:{color:'#a1a1aa',font:{size:11}}}},
    plugins:{legend:{display:false}}
  }
});
</script>
</body>
</html>
