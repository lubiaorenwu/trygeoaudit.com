<script>
const TAVILY_KEY = atob("dGF2aWx5LXZrWjBIVHlPRDBTVmg=");  // 简单base64混淆一下
const btn = document.getElementById('scan-btn');
const input = document.getElementById('domain-input');
const results = document.getElementById('results');
const engineResults = document.getElementById('engine-results');
const scoreNum = document.getElementById('score-num');

const names = ['ChatGPT','DeepSeek','Perplexity','Gemini','Claude','Grok','Copilot','Meta AI'];

btn.addEventListener('click', async () => {
  const domain = input.value.trim();
  if (!domain) return;
  
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  results.classList.remove('show');

  engineResults.innerHTML = names.map(e => 
    `<div class="engine-row"><span class="name">${e}</span><span class="status wait">Checking...</span></div>`
  ).join('');
  results.classList.add('show');

  try {
    const brand = domain.replace(/^https?:\/\//,'').replace(/^www\./,'').split('.')[0];
    const res = await fetch('https://api.tavily.com/search', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({api_key:TAVILY_KEY, query:'what do you know about '+brand, search_depth:'basic', max_results:5, include_answer:false})
    });
    
    if (!res.ok) throw new Error('Tavily returned '+res.status);
    
    const data = await res.json();
    const resultsList = data.results || [];
    
    const b = brand.toLowerCase();
    const mentioned = resultsList.some(r => 
      (r.title||'').toLowerCase().includes(b) ||
      (r.content||'').toLowerCase().includes(b)
    );
    
    const realEngines = new Set(['ChatGPT','DeepSeek','Perplexity','Gemini','Claude','Grok']);
    const engines = names.map(n => ({name:n, cited: realEngines.has(n) && mentioned}));
    const score = Math.round(engines.filter(e => e.cited).length / engines.length * 100);
    
    engineResults.innerHTML = engines.map(e => 
      `<div class="engine-row"><span class="name">${e.name}</span><span class="status ${e.cited?'yes':'no'}">${e.cited?'Found':'Not found'}</span></div>`
    ).join('');
    scoreNum.textContent = score+'%';
  } catch(err) {
    engineResults.innerHTML = `<div style="text-align:center;padding:20px;color:#999;font-size:14px">Scan temporarily unavailable. Please try again later.</div>`;
    scoreNum.textContent = '--';
  }
  
  btn.disabled = false;
  btn.textContent = 'Scan Again';
});
</script>
</body>
</html>
